services:
  samatha-ai:
    image: ghcr.io/open-webui/open-webui:main
    container_name: samatha-ai
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - samatha_data:/app/backend/data
    environment:
      WEBUI_AUTH: "False"

  jarvis-ui:
    image: nginx:alpine
    container_name: jarvis-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./jarvis-ui:/usr/share/nginx/html:ro

  camera-relay:
    image: alexxit/go2rtc:latest
    container_name: camera-relay
    restart: unless-stopped
    ports:
      - "8081:1984"
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./camera/go2rtc.yaml:/config/go2rtc.yaml:ro

volumes:
  samatha_data:
