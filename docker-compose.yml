services:
  samatha-ai:
    image: ghcr.io/open-webui/open-webui:main
    container_name: samatha-ai
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - samatha_data:/app/backend/data
    environment:
      WEBUI_AUTH: "False"

  jarvis-ui:
    image: nginx:alpine
    container_name: jarvis-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./jarvis-ui:/usr/share/nginx/html:ro

  camera-stream:
    image: lscr.io/linuxserver/ffmpeg:latest
    container_name: camera-stream
    restart: unless-stopped
    devices:
      - /dev/video0:/dev/video0
    ports:
      - "8081:8081"
    environment:
      CAMERA_DEVICE: /dev/video0
      STREAM_PORT: 8081
      STREAM_FPS: 10
      STREAM_QUALITY: 7
    command:
      - -hide_banner
      - -loglevel
      - error
      - -f
      - v4l2
      - -i
      - /dev/video0
      - -vf
      - fps=10
      - -f
      - mjpeg
      - -q:v
      - "7"
      - -listen
      - "1"
      - http://0.0.0.0:8081/stream.mjpg
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/stream.mjpg >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 6s
      retries: 3
      start_period: 15s

volumes:
  samatha_data:
