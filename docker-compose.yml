services:
  samatha-ai:
    image: ghcr.io/open-webui/open-webui:main
    container_name: samatha-ai
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - samatha_data:/app/backend/data
    environment:
      WEBUI_AUTH: "False"

  jarvis-ui:
    image: nginx:alpine
    container_name: jarvis-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./jarvis-ui:/usr/share/nginx/html:ro

  camera-stream:
    image: jrottenberg/ffmpeg:6.1-alpine
    container_name: camera-stream
    restart: unless-stopped
    devices:
      - /dev/video0:/dev/video0
    ports:
      - "8081:8081"
    command:
      - -hide_banner
      - -loglevel
      - error
      - -f
      - v4l2
      - -i
      - /dev/video0
      - -vf
      - fps=10
      - -f
      - mjpeg
      - -q:v
      - "7"
      - -listen
      - "1"
      - http://0.0.0.0:8081/stream.mjpg

volumes:
  samatha_data:
