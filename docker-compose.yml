services:
  rpi-monitor:
    image: nicolargo/glances:latest
    container_name: rpi-monitor
    restart: unless-stopped
    ports:
      - "61208:61208"
    pid: host
    environment:
      GLANCES_OPT: "-w"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    cpus: "0.20"
    mem_limit: 128m

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  samatha-ai:
    image: ghcr.io/open-webui/open-webui:main
    container_name: samatha-ai
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    volumes:
      - samatha_data:/app/backend/data
    environment:
      WEBUI_AUTH: "false"
      ENABLE_OLLAMA_API: "True"
      TOOL_SERVER_CONNECTIONS: ${SAMATHA_TOOL_SERVER_CONNECTIONS:-[]}
      ENABLE_CODE_INTERPRETER: ${SAMATHA_ENABLE_CODE_INTERPRETER:-False}
      ENABLE_CODE_EXECUTION: ${SAMATHA_ENABLE_CODE_EXECUTION:-False}
      ENABLE_MEMORIES: ${SAMATHA_ENABLE_MEMORIES:-False}
      OLLAMA_BASE_URL: ${SAMATHA_OLLAMA_BASE_URL:-http://ollama:11434}
      OPENAI_API_BASE_URL: ${SAMATHA_CONTAINER_API_BASE_URL:-http://ollama:11434/v1}
      OPENAI_API_KEY: ${SAMATHA_CONTAINER_API_KEY:-ollama}
      OPENAI_API_BASE_URLS: ${SAMATHA_OPENAI_API_BASE_URLS:-http://ollama:11434/v1}
      OPENAI_API_KEYS: ${SAMATHA_OPENAI_API_KEYS:-ollama}
      DEFAULT_MODELS: ${SAMATHA_DEFAULT_MODEL:-tinyllama}
      SAMATHA_MCP_SERVER_URL: ${SAMATHA_MCP_SERVER_URL:-http://automation-mcp-server:8080/mcp}
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://127.0.0.1:8080/_app/version.json > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s

  jarvis-ui:
    image: nginx:alpine
    container_name: jarvis-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./jarvis-ui:/usr/share/nginx/html:ro

  camera-relay:
    image: alexxit/go2rtc:latest
    container_name: camera-relay
    restart: unless-stopped
    ports:
      - "8081:1984"
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./camera/go2rtc.yaml:/config/go2rtc.yaml:ro

  action-hub:
    build:
      context: ./action-hub
    container_name: action-hub
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - action_data:/data
    environment:
      ACTION_DB_PATH: /data/actions.db
      HA_PRESENCE_BASE_URL: http://192.168.1.80:8123
      HA_ENERGY_BASE_URL: http://192.168.1.123:8123
      SAMATHA_BASE_URL: ${SAMATHA_BASE_URL:-http://samatha-ai:8080}
      HOMEY_BASE_URL: ${HOMEY_BASE_URL:-}
      HA_PRESENCE_TOKEN: ${HA_PRESENCE_TOKEN:-}
      HA_ENERGY_TOKEN: ${HA_ENERGY_TOKEN:-}
      HOMEY_TOKEN: ${HOMEY_TOKEN:-}
      SAMATHA_API_KEY: ${SAMATHA_API_KEY:-}

volumes:
  ollama_data:
  samatha_data:
  action_data:
