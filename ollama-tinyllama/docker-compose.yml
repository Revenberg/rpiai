services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-tinyllama
    platform: linux/arm64
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ${OLLAMA_MODELS_VOLUME:-ollama_models}:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ollama_models:
