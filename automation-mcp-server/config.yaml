homey:
  enabled: true
  base_url: http://homey
  bearer_token: REPLACE_HOMEY_TOKEN
  timeout_seconds: 15

homeassistant:
  instances:
    energie:
      url: http://192.168.1.123:8123
      token: REPLACE_HOME_ASSISTANT_ENERGIE_TOKEN
      timeout_seconds: 15
    aanwezigheid:
      url: http://192.168.1.80:8123
      token: REPLACE_HOME_ASSISTANT_AANWEZIGHEID_TOKEN
      timeout_seconds: 15

jwt:
  enabled: false
  secret_key: CHANGE_ME
  algorithm: HS256
  audience: null
  issuer: null

server:
  host: 0.0.0.0
  port: 8080
